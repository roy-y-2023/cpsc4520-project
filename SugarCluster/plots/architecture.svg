<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="100%" height="100%" style="background-color: #FFFFFF; font-family: 'Inter', system-ui, -apple-system, sans-serif;">
    <defs>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#0F172A" flood-opacity="0.06"/>
        </filter>
        <filter id="shadow-hover" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#0F172A" flood-opacity="0.1"/>
        </filter>

        <linearGradient id="grad-blue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EFF6FF" />
            <stop offset="100%" stop-color="#DBEAFE" />
        </linearGradient>
        <linearGradient id="grad-purple" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F5F3FF" />
            <stop offset="100%" stop-color="#EDE9FE" />
        </linearGradient>
        <linearGradient id="grad-teal" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F0FDFA" />
            <stop offset="100%" stop-color="#CCFBF1" />
        </linearGradient>
        <linearGradient id="grad-orange" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FFFBEB" />
            <stop offset="100%" stop-color="#FEF3C7" />
        </linearGradient>
        <linearGradient id="grad-indigo" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#EEF2FF" />
            <stop offset="100%" stop-color="#E0E7FF" />
        </linearGradient>
        <linearGradient id="grad-pink" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#FDF2F8" />
            <stop offset="100%" stop-color="#FCE7F3" />
        </linearGradient>
        <linearGradient id="grad-emerald" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#F0FDF4" />
            <stop offset="100%" stop-color="#DCFCE7" />
        </linearGradient>

        <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
            <path d="M 0 1 L 8 5 L 0 9 z" fill="#64748B" />
        </marker>
    </defs>

    <rect width="100%" height="100%" fill="#FFFFFF" />

    <g fill="none" stroke="#64748B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
        
        <path d="M 440 260 L 650 260" marker-end="url(#arrow)" />
        <path d="M 1020 260 L 1230 260" marker-end="url(#arrow)" />

        <path d="M 1420 330 C 1420 400, 1200 400, 1200 460" stroke-dasharray="10 8" marker-end="url(#arrow)" />
        <path d="M 1420 330 C 1420 400, 1640 400, 1640 460" stroke-dasharray="10 8" marker-end="url(#arrow)" />

        <path d="M 1200 610 C 1200 680, 1420 680, 1420 740" marker-end="url(#arrow)" />
        <path d="M 1640 610 C 1640 680, 1420 680, 1420 740" marker-end="url(#arrow)" />

        <path d="M 1240 820 L 1030 820" marker-end="url(#arrow)" />
        <path d="M 660 820 L 450 820" marker-end="url(#arrow)" />

    </g>


    <g transform="translate(80, 190)">
        <rect width="360" height="140" rx="16" fill="url(#grad-blue)" stroke="#93C5FD" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#3B82F6" stroke-width="3" stroke-linecap="round">
            <path d="M 44 58 h 24 M 44 70 h 24 M 44 82 h 24" />
            <path d="M 50 54 v 8 M 62 66 v 8 M 48 78 v 8" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">sweep.toml</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">4 configuration knobs</text>
    </g>

    <g transform="translate(660, 190)">
        <rect width="360" height="140" rx="16" fill="url(#grad-purple)" stroke="#C4B5FD" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#8B5CF6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <polyline points="48,58 38,70 48,82" />
            <polyline points="64,58 74,70 64,82" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">generate_configs.py</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">Python setup generator</text>
    </g>

    <g transform="translate(1240, 190)">
        <rect width="360" height="140" rx="16" fill="url(#grad-teal)" stroke="#5EEAD4" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#14B8A6" stroke-width="2.5" fill="none" stroke-linejoin="round">
            <rect x="40" y="52" width="20" height="24" rx="3" />
            <rect x="46" y="58" width="20" height="24" rx="3" fill="#FFFFFF" />
            <rect x="52" y="64" width="20" height="24" rx="3" fill="#FFFFFF" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">2,168 .config files</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">+ jobs.csv manifest</text>
    </g>

    <g transform="translate(1020, 470)">
        <rect width="360" height="140" rx="16" fill="url(#grad-orange)" stroke="#FCD34D" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <polyline points="44,58 54,66 44,74" />
            <line x1="50" y1="82" x2="66" y2="82" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">submit.slurm</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">Standard Job Array Mode</text>
    </g>

    <g transform="translate(1460, 470)">
        <rect width="360" height="140" rx="16" fill="url(#grad-orange)" stroke="#FCD34D" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#F59E0B" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none">
            <polyline points="44,58 54,66 44,74" />
            <line x1="50" y1="82" x2="66" y2="82" />
        </g>
        <text x="108" y="65" font-size="20" font-weight="700" fill="#1E293B">submit_tamulauncher.slurm</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">High-Throughput Launcher Mode</text>
    </g>

    <g transform="translate(1240, 750)">
        <rect width="360" height="140" rx="16" fill="url(#grad-indigo)" stroke="#A5B4FC" stroke-width="3" filter="url(#shadow-hover)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#4F46E5" stroke-width="2.5" fill="none" stroke-linejoin="round">
            <rect x="40" y="50" width="32" height="10" rx="2" />
            <circle cx="46" cy="55" r="1.5" fill="#4F46E5"/>
            <rect x="40" y="64" width="32" height="10" rx="2" />
            <circle cx="46" cy="69" r="1.5" fill="#4F46E5"/>
            <rect x="40" y="78" width="32" height="10" rx="2" />
            <circle cx="46" cy="83" r="1.5" fill="#4F46E5"/>
        </g>
        <text x="108" y="65" font-size="22" font-weight="800" fill="#1E293B">ACES HPC Cluster</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">Output: 2,168 JSON results</text>
    </g>

    <g transform="translate(660, 750)">
        <rect width="360" height="140" rx="16" fill="url(#grad-pink)" stroke="#F9A8D4" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#EC4899" stroke-width="3" stroke-linecap="round" fill="none">
            <path d="M 40 82 v -12 M 48 82 v -22 M 56 82 v -16 M 64 82 v -26 M 72 82 v -18" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">Data Processing</text>
        <text x="108" y="95" font-size="15" font-weight="500" fill="#475569">aggregate.py / analyze.py / plots.py</text>
    </g>

    <g transform="translate(80, 750)">
        <rect width="360" height="140" rx="16" fill="url(#grad-emerald)" stroke="#86EFAC" stroke-width="2" filter="url(#shadow)" />
        <circle cx="56" cy="70" r="32" fill="#FFFFFF" filter="url(#shadow)" />
        <g stroke="#22C55E" stroke-width="2.5" fill="none" stroke-linejoin="round">
            <rect x="40" y="52" width="32" height="32" rx="4" />
            <circle cx="48" cy="62" r="3" fill="#22C55E" stroke="none" />
            <path d="M 40 80 l 10 -12 l 6 6 l 8 -8 l 8 8" />
        </g>
        <text x="108" y="65" font-size="22" font-weight="700" fill="#1E293B">Final Visualizations</text>
        <text x="108" y="95" font-size="16" font-weight="500" fill="#475569">plots/*.png (8 figures)</text>
    </g>

</svg>
